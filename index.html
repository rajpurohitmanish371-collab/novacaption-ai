<!DOCTYPE html>
<html>
<head>
  <title>NovaCaption AI</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 320px;
      padding: 25px;
      background: #111;
      border-radius: 12px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #ff0055;
      color: white;
      cursor: pointer;
    }

    #output {
      margin-top: 15px;
      white-space: pre-line;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h3>NovaCaption AI</h3>

  <input id="input" placeholder="Enter idea">

  <br>

  <button onclick="generateCaption()">Generate</button>
  <button onclick="copyText()">Copy</button>

  <p id="output">Ready...</p>
</div>

<script>
async function generateCaption() {
  const input = document.getElementById("input").value;

  document.getElementById("output").innerText = "Generating...";

  const res = await fetch("https://novacaption-backend.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt: input })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    data.choices?.[0]?.message?.content || "Error";
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
